<!DOCTYPE html>
<html>
<head>
    <title>Copy PDF</title>

    <script>
        function copyPDF() {
            const link = "https://yourusername.github.io/project/pdfs/sem6javasolvedslips (1).pdf";
            navigator.clipboard.writeText(link);
            alert("PDF link copied!");
        }
    </script>
</head>

<body style="text-align:center; font-family:Arial;">

<h2>📄 My PDF</h2>

<!-- View PDF -->
<a href="sem6javasolvedslips (1).pdf" target="_blank">Open PDF</a>
<br><br>


<!-- Copy Link -->
<button onclick="copyPDF(sem6javasolvedslips (1).pdf)">Copy PDF Link</button>

</body>
</html>
